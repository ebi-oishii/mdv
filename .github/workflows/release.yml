name: Release

# Triggered when an annotated/lightweight tag like `v0.1.0-alpha.1` is pushed.
# The workflow:
#   1. Builds the Tauri GUI on macOS (arm64 + x86_64) / Ubuntu / Windows via
#      `tauri-apps/tauri-action`, which auto-creates a draft GitHub Release
#      and uploads the dmg / msi / AppImage to it.
#   2. In parallel, builds the standalone `mddiff-tui` binary for each target
#      and uploads it to the same release.
#
# Releases are created as DRAFT + PRERELEASE so a human can review the
# generated notes / artifacts before publishing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - run: npm ci

      - name: Build & release with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "mddiff ${{ github.ref_name }}"
          releaseBody: |
            See [README](https://github.com/ebi-oishii/mddiff#readme) for what's in this release.

            **Downloads**

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `mddiff_<ver>_aarch64.dmg` |
            | macOS (Intel) | `mddiff_<ver>_x64.dmg` |
            | Windows | `mddiff_<ver>_x64-setup.msi` |
            | Linux | `mddiff_<ver>_amd64.AppImage` |
            | TUI binaries | `mddiff-tui-<target>` |
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}

  build-tui:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: mddiff-tui-macos-arm64
            binext: ""
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: mddiff-tui-macos-x64
            binext: ""
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: mddiff-tui-linux-x64
            binext: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mddiff-tui-windows-x64.exe
            binext: ".exe"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          # TUI doesn't need the src-tauri workspace, but rust-cache scopes
          # by Cargo.toml so just point at the workspace root.
          workspaces: ". -> target"

      - name: Build mddiff-tui
        run: cargo build --release -p mddiff-tui --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/mddiff-tui${{ matrix.binext }} \
             dist/${{ matrix.artifact }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: true
