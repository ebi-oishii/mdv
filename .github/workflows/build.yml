name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - run: npm ci

      - name: Type check
        run: npm run check

      - name: Cargo check (workspace)
        run: cargo check --workspace --target ${{ matrix.target }}

      # Cargo check (syntax + types) runs on all 3 OS.
      # cargo test on Windows currently fails linking the libgit2-sys binary
      # (missing advapi32 / secur32 / Crypt32 imports — known issue with
      # newer MSVC toolchains until libgit2-sys updates its #[link] list).
      # The same tests run on macOS + Linux so we still get coverage.
      - name: Cargo test (mddiff-core)
        if: matrix.os != 'windows-latest'
        run: cargo test -p mddiff-core --target ${{ matrix.target }}
